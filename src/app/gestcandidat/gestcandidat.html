<div class="min-h-screen bg-gradient-to-br from-orange-50 to-orange-100 py-8 px-4 mt-15">
  <div class="max-w-4xl mx-auto">
    
    <!-- En-tête avec effet de flou -->
    <div class="text-center mb-8">
      <h2 class="text-4xl font-bold text-orange-800 mb-2">Gestion des candidats</h2>
      <div class="w-24 h-1 bg-orange-500 mx-auto rounded-full"></div>
    </div>

    <!-- Formulaire d'ajout/modification avec fond flouté -->
    <div class="backdrop-blur-lg bg-white/30 rounded-2xl shadow-xl p-6 mb-8 border border-orange-200/50">
      <form (submit)="saveCandidat(); $event.preventDefault()" class="space-y-4">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
          <input type="text" placeholder="Nom complet"
                class="w-full px-4 py-3 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all"
                [(ngModel)]="candidat.nom_complet" name="nom_complet" required>

          <input type="email" placeholder="Email"
                class="w-full px-4 py-3 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all"
                [(ngModel)]="candidat.email" name="email" required>

          <input type="text" placeholder="Téléphone"
                class="w-full px-4 py-3 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all"
                [(ngModel)]="candidat.tel" name="tel" required>

          <input type="number" placeholder="Université ID"
                class="w-full px-4 py-3 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all"
                [(ngModel)]="candidat.universite_id" name="universite_id">

          <!-- Sélecteur de formation -->
          <select [(ngModel)]="candidat.formation_id" name="formation_id" required
                  class="w-full px-4 py-3 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all md:col-span-2">
            <option [ngValue]="0" class="bg-white">-- Choisir une formation --</option>
            @for (f of formations(); track f.id) {
              <option [ngValue]="f.id" class="bg-white">{{ f.nom }}</option>
            }
          </select>
        </div>

        <button type="submit" 
                class="w-full md:w-auto px-8 py-3 bg-gradient-to-r from-orange-500 to-orange-600 hover:from-orange-600 hover:to-orange-700 text-white font-semibold rounded-xl shadow-lg hover:shadow-xl transform hover:scale-105 transition-all duration-200">
          @if (editMode()) {
            <span class="flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
              </svg>
              Modifier
            </span>
          } @else {
            <span class="flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
              </svg>
              Ajouter
            </span>
          }
        </button>
      </form>
    </div>

    <!-- Section liste des candidats -->
    <div class="backdrop-blur-lg bg-white/30 rounded-2xl shadow-xl p-6 border border-orange-200/50">
      <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <h3 class="text-2xl font-bold text-orange-800">Liste des candidats</h3>
        
        <!-- Filtre par formation -->
        <div class="flex items-center gap-2">
          <span class="text-orange-700 font-medium">Filtrer:</span>
          <select [(ngModel)]="formationFiltre"
                  class="px-4 py-2 rounded-xl bg-white/70 backdrop-blur-sm border border-orange-300 focus:border-orange-500 focus:ring-2 focus:ring-orange-200 outline-none transition-all">
            <option [ngValue]="null" class="bg-white">Toutes les formations</option>
            @for (f of formations(); track f.id) {
              <option [ngValue]="f.id" class="bg-white">{{ f.nom }}</option>
            }
          </select>
        </div>
      </div>

      <!-- Liste des candidats -->
      <div class="space-y-4">
        @for (c of getCandidatsParFormation(); track c.id) {
          <div class="group backdrop-blur-sm bg-white/50 rounded-xl p-5 border border-orange-200 hover:border-orange-400 hover:shadow-lg transition-all duration-200">
            <div class="flex flex-col md:flex-row justify-between items-start gap-4">
              <div class="flex-1">
                <div class="flex items-center gap-3 mb-2">
                  <div class="w-10 h-10 rounded-full bg-gradient-to-r from-orange-400 to-orange-500 flex items-center justify-center text-white font-bold text-lg">
                    {{c.nom_complet.charAt(0)}}
                  </div>
                  <div>
                    <p class="font-bold text-orange-800 text-lg">{{c.nom_complet}}</p>
                    <div class="flex flex-wrap gap-3 text-sm text-orange-600">
                      <span class="flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path>
                        </svg>
                        {{c.email}}
                      </span>
                      <span class="flex items-center gap-1">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 5a2 2 0 012-2h3.28a1 1 0 01.948.684l1.498 4.493a1 1 0 01-.502 1.21l-2.257 1.13a11.042 11.042 0 005.516 5.516l1.13-2.257a1 1 0 011.21-.502l4.493 1.498a1 1 0 01.684.949V19a2 2 0 01-2 2h-1C9.716 21 3 14.284 3 6V5z"></path>
                        </svg>
                        {{c.tel}}
                      </span>
                    </div>
                  </div>
                </div>
                <p class="text-sm text-orange-600 mt-2">
                  Formation: <span class="font-semibold">{{getFormationNom(c.formation_id)}}</span>
                </p>
              </div>
              
              <!-- Boutons d'action -->
              <div class="flex gap-2">
                <button (click)="editCandidat(c)" 
                        class="p-2 bg-orange-100 hover:bg-orange-200 text-orange-700 rounded-lg transition-all duration-200 group-hover:scale-110">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
                  </svg>
                </button>
                <button (click)="deleteCandidat(c.id!)" 
                        class="p-2 bg-red-100 hover:bg-red-200 text-red-700 rounded-lg transition-all duration-200 group-hover:scale-110">
                  <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path>
                  </svg>
                </button>
              </div>
            </div>
          </div>
        } @empty {
          <div class="text-center py-12 backdrop-blur-sm bg-white/30 rounded-xl">
            <svg class="w-16 h-16 text-orange-300 mx-auto mb-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"></path>
            </svg>
            <p class="text-orange-600 text-lg">Aucun candidat pour le moment.</p>
          </div>
        }
      </div>

      <!-- Boutons d'exportation -->
      <div class="flex gap-4 justify-end mt-6">
        <button (click)="exportExcel()" 
                class="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-green-500 to-green-600 hover:from-green-600 hover:to-green-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transform hover:scale-105 transition-all duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 10v6m0 0l-3-3m3 3l3-3m2 8H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          Exporter Excel
        </button>
        <button (click)="exportWord()" 
                class="flex items-center gap-2 px-6 py-3 bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600 hover:to-blue-700 text-white font-semibold rounded-xl shadow-md hover:shadow-lg transform hover:scale-105 transition-all duration-200">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path>
          </svg>
          Exporter Word
        </button>
      </div>
    </div>
  </div>
</div>
